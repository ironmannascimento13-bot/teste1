<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Agente Cognitivo Local</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 16px;
    }
    h1 { font-size: 1.2rem; }
    textarea, input, button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
    }
    textarea {
      min-height: 100px;
    }
    button {
      background: #2563eb;
      color: white;
      font-weight: bold;
    }
    .box {
      background: #020617;
      padding: 12px;
      border-radius: 10px;
      margin-top: 12px;
    }
    pre {
      white-space: pre-wrap;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<h1>🧠 Agente Cognitivo Local</h1>

<div class="box">
  <label>🔑 API Key (fica só no seu navegador)</label>
  <input id="apiKey" type="password" placeholder="sk-..." />
</div>

<div class="box">
  <label>🎯 Objetivo atual</label>
  <textarea id="goal"></textarea>
</div>

<div class="box">
  <label>🧪 Hipótese nova</label>
  <textarea id="hypothesis"></textarea>
  <button onclick="saveHypothesis()">Salvar hipótese</button>
</div>

<div class="box">
  <label>🤖 Pedir ajuda cognitiva (LLM)</label>
  <button onclick="askLLM()">Gerar hipótese não redundante</button>
</div>

<div class="box">
  <h3>📚 Memória local</h3>
  <pre id="memoryView"></pre>
</div>

<script>
  const memory = JSON.parse(localStorage.getItem("agent_memory")) || {
    goal: "",
    hypotheses: [],
    negative_memory: [],
    log: []
  };

  document.getElementById("goal").value = memory.goal;
  render();

  function saveHypothesis() {
    const h = document.getElementById("hypothesis").value.trim();
    if (!h) return;
    memory.hypotheses.push({
      text: h,
      timestamp: new Date().toISOString()
    });
    memory.log.push("Hipótese adicionada");
    persist();
  }

  async function askLLM() {
    const apiKey = document.getElementById("apiKey").value.trim();
    if (!apiKey) {
      alert("Coloca a API key primeiro.");
      return;
    }

    const prompt = `
Você é um operador cognitivo.
Objetivo: ${memory.goal}

Hipóteses existentes:
${memory.hypotheses.map(h => "- " + h.text).join("\n")}

Tarefa:
Gere NO MÁXIMO 1 hipótese nova que:
- Não seja redundante
- Tenha critério de falsificação claro
- Seja estruturalmente distinta

Responda apenas com a hipótese.
`;

    memory.log.push("Chamando LLM");
    persist();

    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + apiKey
      },
      body: JSON.stringify({
        model: "gpt-4.1-mini",
        messages: [{ role: "user", content: prompt }],
        temperature: 0.4
      })
    });

    const data = await response.json();
    const text = data.choices[0].message.content;

    memory.hypotheses.push({
      text,
      timestamp: new Date().toISOString(),
      source: "LLM"
    });

    memory.log.push("Hipótese recebida do LLM");
    persist();
  }

  function persist() {
    memory.goal = document.getElementById("goal").value;
    localStorage.setItem("agent_memory", JSON.stringify(memory, null, 2));
    document.getElementById("hypothesis").value = "";
    render();
  }

  function render() {
    document.getElementById("memoryView").textContent =
      JSON.stringify(memory, null, 2);
  }
</script>

</body>
</html>
