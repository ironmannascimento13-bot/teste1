<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CARE-X — Sistema Cognitivo</title>
<style>
body {
  font-family: system-ui, sans-serif;
  background: #0f1220;
  color: #eee;
  margin: 0;
  padding: 20px;
}
h1 { color: #8be9fd; }
section {
  background: #1a1d2e;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}
textarea, input {
  width: 100%;
  background: #0f1220;
  color: #eee;
  border: 1px solid #444;
  border-radius: 8px;
  padding: 8px;
}
button {
  margin-top: 8px;
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  background: #50fa7b;
  cursor: pointer;
}
pre {
  background: #0f1220;
  padding: 8px;
  border-radius: 8px;
  overflow-x: auto;
}
.alert { color: #ff5555; font-weight: bold; }
.ok { color: #50fa7b; }
</style>
</head>
<body>

<h1>🧠 CARE-X</h1>

<section>
  <h2>🎯 Objetivo</h2>
  <input id="goalInput" placeholder="Defina o problema"/>
  <button onclick="setGoal()">Salvar objetivo</button>
</section>

<section>
  <h2>💬 Entrada Externa (LLM / Humano)</h2>
  <textarea id="externalInput" rows="4" placeholder="Cole aqui uma resposta do ChatGPT ou sua própria ideia"></textarea>
  <button onclick="processExternal()">Processar entrada</button>
</section>

<section>
  <h2>📈 Métricas Cognitivas</h2>
  <pre id="metricsView"></pre>
</section>

<section>
  <h2>🧠 Memória Estrutural</h2>
  <pre id="memoryView"></pre>
</section>

<section>
  <h2>🚨 Estado do Sistema</h2>
  <div id="alertView"></div>
</section>

<script>
let db;
const DB_NAME = "carex_db";

const openDB = () => {
  const req = indexedDB.open(DB_NAME, 1);
  req.onupgradeneeded = e => {
    db = e.target.result;
    db.createObjectStore("state", { keyPath: "key" });
  };
  req.onsuccess = e => {
    db = e.target.result;
    loadState();
  };
};

const save = (key, value) => {
  const tx = db.transaction("state", "readwrite");
  tx.objectStore("state").put({ key, value });
};

const load = (key, cb) => {
  const tx = db.transaction("state", "readonly");
  const req = tx.objectStore("state").get(key);
  req.onsuccess = () => cb(req.result?.value);
};

let state = {
  goal: "",
  hypotheses: [],
  observables: [],
  history: [],
  stagnationScore: 0
};

const loadState = () => {
  load("state", v => {
    if (v) state = v;
    render();
  });
};

const setGoal = () => {
  state.goal = document.getElementById("goalInput").value;
  save("state", state);
  render();
};

const similarity = (a, b) => {
  const sa = new Set(a.toLowerCase().split(/\W+/));
  const sb = new Set(b.toLowerCase().split(/\W+/));
  const inter = [...sa].filter(x => sb.has(x)).length;
  return inter / Math.max(sa.size, sb.size, 1);
};

const processExternal = () => {
  const text = document.getElementById("externalInput").value;
  document.getElementById("externalInput").value = "";

  let maxSim = 0;
  for (let h of state.hypotheses) {
    maxSim = Math.max(maxSim, similarity(h.text, text));
  }

  if (maxSim > 0.92) {
    state.stagnationScore++;
  } else {
    state.stagnationScore = Math.max(0, state.stagnationScore - 1);
    state.hypotheses.push({ text, t: Date.now() });
  }

  state.history.push({ text, sim: maxSim, t: Date.now() });
  save("state", state);
  render();
};

const render = () => {
  document.getElementById("memoryView").textContent =
    JSON.stringify(state, null, 2);

  document.getElementById("metricsView").textContent =
    `Hipóteses: ${state.hypotheses.length}
Estagnação: ${state.stagnationScore}`;

  document.getElementById("alertView").innerHTML =
    state.stagnationScore >= 3
      ? `<span class="alert">⚠ Estagnação cognitiva detectada</span>`
      : `<span class="ok">✔ Exploração produtiva</span>`;
};

openDB();
</script>

</body>
</html>
