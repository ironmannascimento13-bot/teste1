<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Agente Cognitivo Local</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 20px;
    }
    h1 { color: #38bdf8; }
    textarea, input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 10px;
      background: #020617;
      color: #e5e7eb;
      border: 1px solid #334155;
    }
    button {
      padding: 10px;
      margin-right: 5px;
      background: #38bdf8;
      color: #020617;
      border: none;
      cursor: pointer;
    }
    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }
    pre {
      background: #020617;
      padding: 10px;
      overflow-x: auto;
      border: 1px solid #334155;
    }
  </style>
</head>
<body>

<h1>🧠 Agente Cognitivo Local</h1>

<label>API Key (fica só no seu navegador)</label>
<input type="password" id="apiKeyInput" placeholder="sk-..." />

<label>Objetivo</label>
<textarea id="goalInput"></textarea>

<label>Nova hipótese (humana)</label>
<textarea id="hypothesisInput"></textarea>
<button onclick="saveHypothesis()">Salvar hipótese</button>

<hr>

<button id="askBtn" onclick="askLLM()">Pedir ajuda cognitiva</button>

<h3>📚 Memória local</h3>
<pre id="memoryView"></pre>

<script>
/* =========================
   ESTADO E MEMÓRIA
========================= */

let busy = false;

const defaultMemory = {
  goal: "",
  hypotheses: [],
  negative_memory: [],
  log: []
};

let memory = JSON.parse(localStorage.getItem("memory")) || defaultMemory;

/* =========================
   UTILIDADES
========================= */

function saveMemory() {
  localStorage.setItem("memory", JSON.stringify(memory, null, 2));
  renderMemory();
}

function renderMemory() {
  document.getElementById("memoryView").textContent =
    JSON.stringify(memory, null, 2);
}

function normalize(text) {
  return text
    .toLowerCase()
    .replace(/[^\w\s]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function isRedundant(text) {
  const n = normalize(text);
  return memory.hypotheses.some(h => normalize(h.text) === n);
}

/* =========================
   AÇÕES HUMANAS
========================= */

function saveHypothesis() {
  const text = document.getElementById("hypothesisInput").value.trim();
  if (!text) return;

  if (isRedundant(text)) {
    memory.log.push("Hipótese humana redundante — descartada");
    saveMemory();
    return;
  }

  memory.hypotheses.push({
    text,
    timestamp: new Date().toISOString(),
    source: "human"
  });

  memory.log.push("Hipótese humana adicionada");
  document.getElementById("hypothesisInput").value = "";
  saveMemory();
}

document.getElementById("apiKeyInput").addEventListener("change", e => {
  localStorage.setItem("apiKey", e.target.value.trim());
});

document.getElementById("goalInput").addEventListener("change", e => {
  memory.goal = e.target.value.trim();
  saveMemory();
});

/* =========================
   CHAMADA AO LLM
========================= */

async function askLLM() {
  if (busy) return;
  busy = true;
  document.getElementById("askBtn").disabled = true;

  try {
    const apiKey = localStorage.getItem("apiKey");
    if (!apiKey) {
      alert("API Key ausente");
      return;
    }

    if (!memory.goal || memory.hypotheses.length === 0) {
      alert("Defina objetivo e pelo menos uma hipótese");
      return;
    }

    memory.log.push("Chamando LLM");
    saveMemory();

    const prompt = `
Objetivo:
${memory.goal}

Hipóteses existentes:
${memory.hypotheses.map(h => "- " + h.text).join("\n")}

Gere UMA nova hipótese:
- estruturalmente diferente
- não redundante
- que reduza espaço de busca
- curta e clara
`;

    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + apiKey
      },
      body: JSON.stringify({
        model: "gpt-4.1-mini",
        messages: [{ role: "user", content: prompt }],
        temperature: 0.7
      })
    });

    if (!res.ok) {
      memory.log.push("Erro HTTP: " + res.status);
      saveMemory();
      return;
    }

    const data = await res.json();
    const text = data.choices[0].message.content.trim();

    if (isRedundant(text)) {
      memory.log.push("Hipótese do LLM redundante — descartada");
      saveMemory();
      return;
    }

    memory.hypotheses.push({
      text,
      timestamp: new Date().toISOString(),
      source: "LLM"
    });

    memory.log.push("Hipótese do LLM adicionada");
    saveMemory();

  } catch (err) {
    memory.log.push("Erro: " + err.message);
    saveMemory();
  } finally {
    busy = false;
    document.getElementById("askBtn").disabled = false;
  }
}

/* =========================
   INIT
========================= */

document.getElementById("apiKeyInput").value =
  localStorage.getItem("apiKey") || "";

document.getElementById("goalInput").value = memory.goal || "";

renderMemory();
</script>

</body>
</html>
