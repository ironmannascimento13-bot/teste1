<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CARE-X v2 — Sistema Cognitivo</title>
<style>
body {
  font-family: system-ui, sans-serif;
  background: #0f1220;
  color: #eee;
  margin: 0;
  padding: 20px;
}
h1 { color: #8be9fd; }
section {
  background: #1a1d2e;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}
textarea, input {
  width: 100%;
  background: #0f1220;
  color: #eee;
  border: 1px solid #444;
  border-radius: 8px;
  padding: 8px;
}
button {
  margin-top: 8px;
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  background: #50fa7b;
  cursor: pointer;
}
pre {
  background: #0f1220;
  padding: 8px;
  border-radius: 8px;
  overflow-x: auto;
}
.alert { color: #ff5555; font-weight: bold; }
.ok { color: #50fa7b; }
.reject { color: #ffb86c; }
</style>
</head>
<body>

<h1>🧠 CARE-X v2</h1>

<section>
  <h2>🎯 Objetivo</h2>
  <input id="goalInput" placeholder="Defina o problema"/>
  <button onclick="setGoal()">Salvar objetivo</button>
</section>

<section>
  <h2>💬 Entrada Externa (CARE-X MODE)</h2>
  <textarea id="externalInput" rows="6"
    placeholder="Cole aqui a resposta do ChatGPT gerada com o prompt CARE-X"></textarea>
  <button onclick="processExternal()">Processar transformação</button>
</section>

<section>
  <h2>📈 Métricas Cognitivas</h2>
  <pre id="metricsView"></pre>
</section>

<section>
  <h2>🧠 Memória Estrutural</h2>
  <pre id="memoryView"></pre>
</section>

<section>
  <h2>🚨 Estado do Sistema</h2>
  <div id="alertView"></div>
</section>

<script>
/* =========================
   Persistência
========================= */
let db;
const DB_NAME = "carex_db_v2";

const openDB = () => {
  const req = indexedDB.open(DB_NAME, 1);
  req.onupgradeneeded = e => {
    db = e.target.result;
    db.createObjectStore("state", { keyPath: "key" });
  };
  req.onsuccess = e => {
    db = e.target.result;
    loadState();
  };
};

const save = (key, value) => {
  const tx = db.transaction("state", "readwrite");
  tx.objectStore("state").put({ key, value });
};

const load = (key, cb) => {
  const tx = db.transaction("state", "readonly");
  const req = tx.objectStore("state").get(key);
  req.onsuccess = () => cb(req.result?.value);
};

/* =========================
   Estado Cognitivo
========================= */
let state = {
  goal: "",
  hypotheses: [],
  observables: [],
  history: [],
  stagnationScore: 0,
  accepted: 0,
  rejected: 0
};

/* =========================
   Normalização Conceitual
========================= */
const normalize = text =>
  text.toLowerCase()
    .replace(/estagnar|estagnação/g, "estagnação")
    .replace(/hipóteses|teorias|modelos/g, "hipótese")
    .replace(/observáveis|métricas|medidas/g, "observável")
    .replace(/redundância|repetição/g, "redundância");

/* =========================
   Vetorização Simples
   (placeholder p/ embeddings WASM)
========================= */
const vectorize = text => {
  const words = normalize(text).split(/\W+/);
  const map = {};
  words.forEach(w => {
    if (!w) return;
    map[w] = (map[w] || 0) + 1;
  });
  return map;
};

const cosineSimilarity = (v1, v2) => {
  let dot = 0, n1 = 0, n2 = 0;
  for (let k in v1) {
    if (v2[k]) dot += v1[k] * v2[k];
    n1 += v1[k] * v1[k];
  }
  for (let k in v2) n2 += v2[k] * v2[k];
  return dot / (Math.sqrt(n1) * Math.sqrt(n2) || 1);
};

/* =========================
   Lógica CARE-X
========================= */
const processExternal = () => {
  const text = document.getElementById("externalInput").value.trim();
  if (!text) return;
  document.getElementById("externalInput").value = "";

  const vec = vectorize(text);
  let maxSim = 0;

  for (let h of state.hypotheses) {
    maxSim = Math.max(
      maxSim,
      cosineSimilarity(h.vector, vec)
    );
  }

  let accepted = false;

  if (maxSim < 0.75) {
    state.hypotheses.push({
      text,
      vector: vec,
      t: Date.now()
    });
    state.stagnationScore = Math.max(0, state.stagnationScore - 1);
    state.accepted++;
    accepted = true;
  } else {
    state.stagnationScore++;
    state.rejected++;
  }

  state.history.push({
    text,
    similarity: maxSim,
    accepted,
    t: Date.now()
  });

  save("state", state);
  render();
};

/* =========================
   UI
========================= */
const setGoal = () => {
  state.goal = document.getElementById("goalInput").value;
  save("state", state);
  render();
};

const render = () => {
  document.getElementById("memoryView").textContent =
    JSON.stringify(state, null, 2);

  document.getElementById("metricsView").textContent =
`Hipóteses aceitas: ${state.accepted}
Hipóteses rejeitadas: ${state.rejected}
Estagnação: ${state.stagnationScore}`;

  document.getElementById("alertView").innerHTML =
    state.stagnationScore >= 3
      ? `<span class="alert">⚠ Estagnação cognitiva detectada</span>`
      : `<span class="ok">✔ Exploração produtiva</span>`;
};

const loadState = () => {
  load("state", v => {
    if (v) state = v;
    render();
  });
};

openDB();
</script>

</body>
</html>
